<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PistonCore</title>
    <style>
        :root {
            --bg: #1c1c1c;
            --surface: #282828;
            --accent: #00ccaa;
            --text: #ddd;
            --muted: #888;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        header { background: #222; padding: 10px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #444; }
        .logo { font-size: 22px; font-weight: bold; color: var(--accent); }

        .main-content { flex: 1; overflow: auto; padding: 16px; display: none; }
        .active { display: block; }

        /* LIST PAGE */
        .folder-header { color: var(--accent); font-size: 17px; margin: 20px 0 6px; padding-bottom: 4px; border-bottom: 1px solid #444; }
        .piston-item { display: flex; align-items: center; padding: 10px 14px; background: var(--surface); margin-bottom: 3px; border-radius: 4px; cursor: pointer; }
        .piston-item:hover { background: #353535; }
        .dot { font-size: 20px; margin-right: 10px; }
        .name { flex: 1; }
        .result { margin-right: 12px; font-size: 20px; }
        .time { color: var(--muted); font-size: 13px; }

        /* STATUS PAGE */
        .script-panel { background: #111; padding: 14px; font-family: monospace; font-size: 14px; line-height: 1.45; white-space: pre; overflow-x: auto; border-radius: 4px; margin: 12px 0; }
        .keyword { color: var(--accent); font-weight: bold; }

        button { padding: 7px 14px; margin: 4px; border-radius: 4px; border: none; cursor: pointer; }
        .btn-primary { background: var(--accent); color: black; font-weight: 600; }
        .btn-danger { background: #c33; color: white; }
    </style>
</head>
<body>

<header>
    <div class="logo">PistonCore</div>
    <div>
        <button onclick="copyAIPrompt()">Copy AI Prompt</button>
        <button onclick="newPiston()" class="btn-primary">+ New</button>
    </div>
</header>

<!-- PISTON LIST -->
<div id="piston-list-page" class="main-content active">
    <input type="text" id="search" placeholder="Search pistons..." style="width:100%; padding:10px; margin-bottom:16px; background:#282828; border:1px solid #555; color:white; border-radius:4px;" onkeyup="filterList()">
    <div id="list-content"></div>
    <div style="text-align:right; margin-top:20px;">
        <button onclick="newFolder()">+ New Folder</button>
        <button onclick="showImport()">Import</button>
    </div>
</div>

<!-- STATUS PAGE -->
<div id="status-page" class="main-content">
    <button onclick="goBack()" style="margin-bottom:12px; background:none; border:none; color:var(--accent); font-size:18px;">← My Pistons</button>

    <h2 id="status-name" style="margin-bottom:8px;"></h2>

    <div style="display:flex; gap:12px; align-items:center; margin-bottom:16px;">
        <span>Folder:</span>
        <select id="folder-sel" style="background:#333;color:white;border:1px solid #555;padding:6px;border-radius:4px;"><option>Outdoor Lighting</option></select>
        <span style="color:#4ade80;">● Active</span>
    </div>

    <div style="display:flex; gap:8px; flex-wrap:wrap; margin:16px 0;">
        <button onclick="editCurrent()" class="btn-primary">✎ Edit</button>
        <button onclick="testLive()" style="background:#f59e0b;color:white;">▶ Test — Live Fire ⚠</button>
        <button onclick="snapshot()">📷 Snapshot</button>
        <button onclick="backup()" class="btn-danger">📷 Backup</button>
        <button onclick="duplicateCurrent()">Duplicate</button>
        <button onclick="deleteCurrent()" class="btn-danger">Delete</button>
    </div>

    <div style="background:#282828; padding:14px; border-radius:6px; margin:16px 0;">
        <strong>PISTON SCRIPT (read-only)</strong>
        <div id="readonly-script" class="script-panel"></div>
    </div>

    <div style="margin-top:20px;">
        <strong>LOG</strong>
        <div id="log-area" style="background:#222; padding:12px; max-height:280px; overflow:auto; border-radius:4px; margin-top:8px;"></div>
    </div>
</div>

<script>
let pistons = [
    {id:"p1", name:"Driveway Lights at Sunset", folder:"Outdoor Lighting", enabled:true, last:"08:46:25", result:"✅"},
    {id:"p2", name:"Front Door Alert", folder:"Security", enabled:true, last:"09:11:44", result:"✅"},
    {id:"p3", name:"Test Piston", folder:"Uncategorized", enabled:true, last:"Never", result:"—"}
];

let currentPiston = null;

function renderList() {
    const container = document.getElementById('list-content');
    container.innerHTML = '';
    const groups = {};
    pistons.forEach(p => {
        const f = p.folder || "Uncategorized";
        if (!groups[f]) groups[f] = [];
        groups[f].push(p);
    });
    Object.keys(groups).sort().forEach(folder => {
        const h = document.createElement('div');
        h.className = 'folder-header';
        h.textContent = `${folder} (${groups[folder].length})`;
        container.appendChild(h);
        groups[folder].forEach(p => {
            const div = document.createElement('div');
            div.className = 'piston-item';
            div.innerHTML = `<span class="dot">${p.enabled ? '●' : '○'}</span><span class="name">${p.name}</span><span class="result">${p.result}</span><span class="time">${p.last}</span>`;
            div.onclick = () => showStatus(p);
            container.appendChild(div);
        });
    });
}

function filterList() {
    const term = document.getElementById('search').value.toLowerCase();
    const filtered = pistons.filter(p => p.name.toLowerCase().includes(term));
    const container = document.getElementById('list-content');
    container.innerHTML = '';
    filtered.forEach(p => {
        const div = document.createElement('div');
        div.className = 'piston-item';
        div.innerHTML = `<span class="dot">${p.enabled ? '●' : '○'}</span><span class="name">${p.name}</span><span class="result">${p.result}</span><span class="time">${p.last}</span>`;
        div.onclick = () => showStatus(p);
        container.appendChild(div);
    });
}

function newPiston() {
    const p = {id:"p"+Date.now(), name:"New Piston", folder:"Uncategorized", enabled:true, last:"Never", result:"—"};
    pistons.push(p);
    renderList();
    showStatus(p);
}

function showStatus(p) {
    currentPiston = p;
    document.getElementById('status-name').textContent = p.name;
    document.getElementById('readonly-script').textContent = `execute\n  with\n    (Driveway Main Light)\n  do\n    Turn On\n      Brightness: 100%\n  end with\nend execute`;
    document.getElementById('log-area').innerHTML = `<div style="padding:8px;">08:46:25 — Triggered by sunset<br>✅ Action completed</div>`;
    document.getElementById('piston-list-page').classList.remove('active');
    document.getElementById('status-page').classList.add('active');
}

function goBack() {
    document.getElementById('status-page').classList.remove('active');
    document.getElementById('piston-list-page').classList.add('active');
}

function editCurrent() { alert("Editor — open editor.html"); }
function testLive() { if(confirm("⚠ This will run real device actions. Continue?")) alert("Test executed live (mock)"); }
function snapshot() { alert("Snapshot (anonymized) copied"); }
function backup() { alert("Full backup saved"); }
function duplicateCurrent() {
    if (!currentPiston) return;
    const dup = JSON.parse(JSON.stringify(currentPiston));
    dup.id = "p"+Date.now(); dup.name += " (Copy)"; dup.folder = "Uncategorized";
    pistons.push(dup); renderList(); goBack();
}
function deleteCurrent() {
    if (!currentPiston || !confirm("Delete this piston?")) return;
    pistons = pistons.filter(p => p.id !== currentPiston.id);
    renderList(); goBack();
}
function newFolder() { alert("New folder — full implementation pending"); }
function showImport() { alert("Import — full implementation pending"); }
function copyAIPrompt() { alert("AI Prompt copied to clipboard"); }

document.addEventListener('keydown', e => {
    if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
        document.getElementById('search').focus();
        e.preventDefault();
    }
});

window.onload = () => { renderList(); };
</script>
</body>
</html>
